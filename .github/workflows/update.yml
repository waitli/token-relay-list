name: Auto-Update Platforms

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://token.waitli.top
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check platforms
        run: python scripts/check_platforms.py

      - name: Copy data to frontend
        run: cp data/checked.json src/data/

      - name: Build SEO assets
        run: python scripts/build_seo.py

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/checked.json src/data/checked.json src/sitemap.xml src/robots.txt
          git diff --staged --quiet || git commit -m "auto: update $(date +%Y-%m-%d)"
          git push
