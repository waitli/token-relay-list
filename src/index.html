<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token 中转平台导航</title>
  <meta name="description" content="Token 中转平台、源头模型与开源自建项目导航，定期检查可访问性并自动更新。">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://token.waitli.top/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Token 中转平台导航">
  <meta property="og:description" content="Token 中转平台、源头模型与开源自建项目导航，定期检查可访问性并自动更新。">
  <meta property="og:url" content="https://token.waitli.top/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117; color: #e6edf3; line-height: 1.6;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 0 10px; }
    header h1 { font-size: 2em; margin-bottom: 8px; }
    header p { color: #8b949e; }
    .meta { text-align: center; color: #484f58; font-size: 0.85em; margin: 10px 0 20px; }
    .meta .ok { color: #3fb950; }
    .meta .fail { color: #f85149; }

    .search-bar { margin-bottom: 24px; }
    .search-bar input {
      width: 100%; background: #161b22; border: 1px solid #30363d; color: #e6edf3;
      padding: 12px 16px; border-radius: 8px; font-size: 1em; outline: none;
    }
    .search-bar input:focus { border-color: #58a6ff; }

    .section { margin-bottom: 36px; }
    .section-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #21262d;
    }
    .section-head h2 { font-size: 1.3em; }
    .section-count { color: #484f58; font-size: 0.85em; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 10px;
      padding: 14px; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px;
    }
    .card:hover { border-color: #58a6ff; }
    .card.offline { opacity: 0.45; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
    .dot.ok { background: #3fb950; box-shadow: 0 0 6px #3fb95066; }
    .dot.no { background: #f85149; }
    .card-body { flex: 1; min-width: 0; }
    .card .name { font-weight: 600; font-size: 0.95em; }
    .card .name a { color: #e6edf3; text-decoration: none; }
    .card .name a:hover { color: #58a6ff; }
    .card .url { color: #484f58; font-size: 0.75em; word-break: break-all; }
    .card .desc { color: #8b949e; font-size: 0.8em; margin-top: 4px; }

    .tag-relay { background: #23863633; color: #3fb950; }
    .tag-source { background: #1f6feb33; color: #58a6ff; }
    .tag-github { background: #a371f733; color: #a371f7; }

    footer { text-align: center; padding: 40px 0; color: #30363d; font-size: 0.8em; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <header><h1>Token 中转平台导航</h1><p>中转平台 · 源头模型 · 开源项目，自动更新</p></header>
  <div class="meta" id="meta"></div>
  <div class="search-bar"><input type="text" id="search" placeholder="搜索平台名称、描述或网址..."></div>
  <div id="sections"></div>
  <footer>数据来源：各平台公开页面 · 自动更新</footer>
</div>
<script>
const TYPE_LABEL = {relay: '中转平台', source: '源头模型', github: 'GitHub 自建项目'};
const TYPE_ORDER = ['relay', 'source', 'github'];
let data = null;

async function init() {
  data = await fetch('./data/checked.json').then(r => r.json());
  document.getElementById('meta').innerHTML =
    `最后更新: ${data.last_updated} · ` +
    `<span class="ok">${data.accessible} 可访问</span> / ` +
    `<span class="fail">${data.total - data.accessible} 不可访问</span> · 共 ${data.total} 个`;
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('sections');
  container.innerHTML = '';

  for (const type of TYPE_ORDER) {
    let items = data.platforms.filter(p => p.type === type);
    if (q) items = items.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.desc||'').toLowerCase().includes(q) ||
      p.url.toLowerCase().includes(q)
    );
    if (items.length === 0) continue;

    // 可访问的排前面
    items.sort((a, b) => (b.accessible - a.accessible) || a.name.localeCompare(b.name));
    const okCount = items.filter(p => p.accessible).length;

    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-head">
        <h2>${TYPE_LABEL[type]}</h2>
        <span class="section-count">${okCount}/${items.length} 可访问</span>
      </div>
      <div class="grid">${items.map(p => `
        <div class="card ${p.accessible ? '' : 'offline'}">
          <div class="dot ${p.accessible ? 'ok' : 'no'}"></div>
          <div class="card-body">
            <div class="name"><a href="${p.url}" target="_blank">${p.name}</a></div>
            <div class="url">${p.url}</div>
            ${p.desc ? `<div class="desc">${p.desc}</div>` : ''}
          </div>
        </div>
      `).join('')}</div>`;
    container.appendChild(section);
  }
}

document.getElementById('search').addEventListener('input', render);
init();
</script>
</body>
</html>
